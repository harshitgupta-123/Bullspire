<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help & Support | Pro Trader</title>

<style>
    :root {
        --primary-green: #00ff66;
        --dark-bg: #050505;
        --card-bg: #0f1115;
        --input-bg: #1a1d23;
        --text-dim: #94a3b8;
    }

    body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--dark-bg);
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(0, 255, 102, 0.05) 0%, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(0, 255, 102, 0.05) 0%, transparent 50%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Container with Glassmorphism */
    .container {
        background: rgba(22, 27, 34, 0.8);
        padding: 40px;
        border-radius: 20px;
        width: 380px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        position: relative;
    }

    /* Subtle glow line at top */
    .container::before {
        content: '';
        position: absolute;
        top: 0; left: 50%; transform: translateX(-50%);
        width: 40%; height: 2px;
        background: var(--primary-green);
        box-shadow: 0 0 15px var(--primary-green);
        border-radius: 0 0 10px 10px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 24px;
        letter-spacing: -0.5px;
        font-weight: 700;
        background: linear-gradient(to bottom, #fff, #888);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Inputs */
    label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 8px;
        margin-left: 4px;
        letter-spacing: 1px;
    }

    input, textarea {
        width: 100%;
        padding: 14px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        background: var(--input-bg);
        color: white;
        outline: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    input:focus, textarea:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 4px rgba(0, 255, 102, 0.1);
        background: #1e222a;
    }

    textarea {
        height: 110px;
        resize: none;
    }

    /* Button Styling */
    button {
        width: 100%;
        padding: 16px;
        background: var(--primary-green);
        color: #000;
        border: none;
        border-radius: 10px;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 15px rgba(0, 255, 102, 0.2);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 255, 102, 0.4);
        filter: brightness(1.1);
    }

    button:active {
        transform: translateY(0);
    }

    button.loading {
        background: #333;
        color: #777;
        cursor: not-allowed;
        transform: none;
    }

    /* Toast Notification (Enhanced) */
    .toast {
        position: fixed;
        top: 30px; /* Moved to top for better visibility */
        right: 30px;
        background: #111;
        border-left: 4px solid var(--primary-green);
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        font-weight: 500;
        transform: translateX(120%);
        transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
    }

    .toast.show {
        transform: translateX(0);
    }

    .toast.error {
        border-left-color: #ff4444;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Help & Support</h2>

    <form id="supportForm">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
        
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
        
        <label>How can we help?</label>
        <textarea id="message" placeholder="Describe your issue in detail..." required></textarea>

        <button type="submit" id="submitBtn">Send Message</button>
    </form>
</div>

<div id="toast" class="toast"></div>

<script>
    const form = document.getElementById("supportForm");
const toast = document.getElementById("toast");
const submitBtn = document.getElementById("submitBtn");

// ✅ Toast function (success / error)
function showToast(message, isError = false) {
    toast.innerHTML = (isError ? '❌ ' : '✅ ') + message;

    toast.className = "toast show" + (isError ? " error" : "");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 4000);
}

// ✅ Email validation
function isValidEmail(email) {
    return /\S+@\S+\.\S+/.test(email);
}

// ✅ Form submit handler
form.addEventListener("submit", function(e) {
    e.preventDefault();

    // Get values
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    // ❌ Validation
    if (!name || !email || !message) {
        showToast("Please fill all fields!", true);
        return;
    }

    if (!isValidEmail(email)) {
        showToast("Invalid email address!", true);
        return;
    }

    // 🔥 Loading state
    submitBtn.classList.add("loading");
    submitBtn.innerText = "Processing...";

    const payload = { name, email, message };

    // 🚀 Send to Flask backend
    fetch("http://127.0.0.1:5000/support", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            showToast("Support ticket created. We'll reply shortly!");
            form.reset();

            setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);
        } 
        
        else {
            showToast(data.message || "Something went wrong!", true);
        }
    })
    .catch(err => {
        console.error(err);
        showToast("Server error! Please try again later.", true);
    })
    .finally(() => {
        // 🔄 Reset button
        submitBtn.classList.remove("loading");
        submitBtn.innerText = "Send Message";
    });
});
</script>

</body>
</html>
