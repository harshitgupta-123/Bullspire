<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Bullspire</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0e0e0e;
      font-family: 'Segoe UI', sans-serif;
      color: #f1f1f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #container {
      background-color: #1c1c1c;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 360px;
      box-sizing: border-box;
      border: 2px solid green;
    }

    #image {
      display: block;
      margin: 0 auto 20px;
    }

    #person {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .name {
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: 500;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      background-color: #2a2a2a;
      color: #f1f1f1;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: #aaa;
    }

    #button {
      background-color: #00e676;
      color: black;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    #button:hover {
      background-color: #00c853;
      transform: scale(1.05);
    }

    #status {
      font-weight: bold;
      margin-top: 10px;
      text-align: center;
    }

    #thumbnail {
      text-align: center;
      font-size: 12px;
      margin-top: 20px;
      color: #ccc;
    }

    #thumbnail a {
      color: #26a69a;
      text-decoration: none;
    }

    #thumbnail a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="person">Login</div>
    <img id="image" src="logo.png" alt="Logo" height="80" width="100">
    
    <form id="signinForm">
      <div class="name">Enter Gmail</div>
      <input type="text" name="gmail" placeholder="Gmail" required />

      <div class="name">Enter Password</div>
      <input type="password" name="password" placeholder="Password" required />

      <input type="submit" id="button" value="Continue" />
    </form>

    <p id="status"></p> 

    <div id="thumbnail">
      By continuing, you agree to Bullspire’s Conditions of Use and 
      <a href="#" target="_blank">Privacy Notice</a>
    </div>
  </div>

 <script>
  const form = document.getElementById("signinForm");
  const statusText = document.getElementById("status");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = new FormData(form);
    const data = {
      gmail: formData.get("gmail"),
      password: formData.get("password")
    };

    try {
      const res = await fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      // ✅ SUCCESS CHECK
      if (res.status === 200) {
        // 🔐 sirf safe data store karo
        localStorage.clear();
        localStorage.setItem("username", result.username);
        localStorage.setItem("gmail", result.gmail);
        localStorage.setItem("user_id",result.user_id);

        statusText.innerText = "✅ Login Successful!";
        statusText.style.color = "lime";

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);

      } else {
        // ❌ ERROR SHOW
        statusText.innerText = result.message || "Login failed";
        statusText.style.color = "red";
      }

    } catch (err) {
      statusText.innerText = "❌ Server error. Try again.";
      statusText.style.color = "red";
      console.error(err);
    }
  });
</script>

</body>
</html>
