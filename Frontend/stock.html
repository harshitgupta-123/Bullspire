    html, body {

    body {

    }

    .content-wrapper {

    }

    .btn-buy:hover {

    }

    .btn-sell {

      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
    }

    .btn-sell:hover {

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 255, 136, 0.3);
      border-radius: 50%;
      border-top-color: #00ff88;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-indicator {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Custom scrollbar for trading panel */
    .trading-content::-webkit-scrollbar {
      width: 4px;
    }

    .trading-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .trading-content::-webkit-scrollbar-thumb {
      background: #00ff88;
      border-radius: 2px;

    .trading-content::-webkit-scrollbar-thumb:hover {

    }

    @media (max-width: 768px) {

        grid-template-columns: 1fr;

      }

        grid-template-columns: 1fr;
      }
      
    }

  <script>
    const urlParams = new URLSearchParams(window.location.search); 
    const symbol = urlParams.get('symbol');
    let currentPrice = 0;

    function updateCalculations() {
      const qty = parseInt(document.getElementById('quantity').value) || 1;
      const subtotal = currentPrice * qty;
      const brokerage = 20;
      const total = subtotal + brokerage;

      document.getElementById('summary-qty').textContent = qty;
      document.getElementById('price-per-share').textContent = `₹${currentPrice}`;
      document.getElementById('subtotal').textContent = `₹${subtotal.toFixed(2)}`;
      document.getElementById('total-amount').textContent = `₹${total.toFixed(2)}`;
    }

    function changeQty(delta) {
      const qtyInput = document.getElementById('quantity');
      let qty = parseInt(qtyInput.value) + delta;
      qty = Math.max(1, qty);
      qtyInput.value = qty;
      updateCalculations();
    }


   function fetchStockData() {

  if (!symbol) {
    document.getElementById("stock-name").innerHTML =
      '<i class="fas fa-exclamation-triangle"></i> No symbol provided';
    return;
  }

  document.getElementById("stock-symbol").innerText = symbol.toUpperCase();
  document.getElementById("stockLogo").innerText = symbol.charAt(0).toUpperCase();

  fetch(`http://127.0.0.1:5000/stock/${symbol}`)
    .then(res => res.json())
    .then(data => {
      console.log("API DATA:", data); // 🔥 DEBUG

      if (data && data.price !== undefined && !isNaN(data.price)) {

        currentPrice = parseFloat(data.price || 0);

        document.getElementById("stock-name").textContent =
          data.name || symbol.toUpperCase();

        document.getElementById("stock-price").innerText =
          `₹${data.price || 0}`;

        document.getElementById("current-price").innerText =
          `₹${data.price || 0}`;

        // company details
        document.getElementById("market-cap").textContent =
          data.marketCap !== 'N/A' && !isNaN(data.marketCap)
            ? `₹${Number(data.marketCap).toLocaleString('en-IN')}`
            : '₹--';

        document.getElementById("pe-ratio").textContent = data.peRatio || '--';
        document.getElementById("week-high").textContent = data.weekHigh ? `₹${data.weekHigh}` : '₹--';
        document.getElementById("week-low").textContent = data.weekLow ? `₹${data.weekLow}` : '₹--';

        document.getElementById("volume").textContent =
          data.volume !== 'N/A' && !isNaN(data.volume)
            ? Number(data.volume).toLocaleString('en-IN')
            : '--';

        document.getElementById("avg-volume").textContent =
          data.avgVolume !== 'N/A' && !isNaN(data.avgVolume)
            ? Number(data.avgVolume).toLocaleString('en-IN')
            : '--';

        // ✅ REAL change
        const change = data.change || 0;
        const percent = data.percent || 0;

        const changeElement = document.getElementById("price-change");

        changeElement.innerHTML =
          `${change >= 0 ? '+' : ''}₹${change} (${percent}%)`;

        changeElement.className =
          `price-change ${change >= 0 ? '' : 'negative'}`;

        updateCalculations();

      } else {
        document.getElementById("stock-name").innerHTML =
          '<i class="fas fa-exclamation-circle"></i> Invalid stock data';
      }
    })
    .catch(err => {
      console.error("FETCH ERROR:", err);

      document.getElementById("stock-name").innerHTML =
        '<i class="fas fa-wifi"></i> Unable to fetch data';
    });
}
    

    document.getElementById('quantity').addEventListener('input', updateCalculations);

    document.querySelectorAll('.btn-trade').forEach(btn => {
      btn.addEventListener('click', function() {
        this.style.transform = 'scale(0.95)';
        setTimeout(() => {
          this.style.transform = '';
        }, 150);
      });
    });

    fetchStockData();
    setInterval(fetchStockData, 5000);  
    
  function buyStock() { 
    //let symbol="vbl.ns" // Pass as PARAMETERS
    
    
    const user_id = localStorage.getItem("user_id");
    const qty = parseInt(document.getElementById("quantity").value);
    alert("BUY CLICKED 🔥"+symbol + " "+ qty +" shares");
    if (!user_id) {
        alert("Login first! Set user_id in localStorage");
        return;
    }

    fetch("http://127.0.0.1:5000/buy", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id: user_id,
            symbol: symbol,           // ✅ Now defined
            quantity: qty,
            price: currentPrice       // ✅ Now defined
        })
    })
    .then(res => {
        console.log("STATUS:", res.status);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    })
    .then(data => {
