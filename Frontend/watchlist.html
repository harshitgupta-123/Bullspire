<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Watchlist</title>

<style>
    body {
        background: #0b0f0a;
        color: #00ff88;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
    }

    h2 {
        text-align: center;
        color: #00ff88;
        margin-bottom: 20px;
    }

    #watchlistContainer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .stock-card {
        background: #111;
        border: 1px solid #00ff88;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 0 10px #00ff8840;
        transition: 0.3s;
    }

    .stock-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 20px #00ff88;
    }

    .stock-card h3 {
        margin: 0;
        color: #00ff88;
    }

    .stock-card p {
        margin: 5px 0;
        color: #ccc;
    }

    .positive {
        color: #00ff88;
        font-weight: bold;
    }

    .negative {
        color: #ff4d4d;
        font-weight: bold;
    }

    button {
        margin-top: 10px;
        padding: 8px 12px;
        background: transparent;
        border: 1px solid #00ff88;
        color: #00ff88;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00ff88;
        color: black;
    }

    .empty {
        text-align: center;
        margin-top: 50px;
        color: #888;
    }
</style>
</head>

<body>

<h2> My Watchlist</h2>

<div id="watchlistContainer"></div>

<script>
let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

function loadWatchlist() {
    const container = document.getElementById("watchlistContainer");
    container.innerHTML = "";

    if (watchlist.length === 0) {
        container.innerHTML = "<p class='empty'>No stocks added yet 😢</p>";
        return;
    }

    watchlist.forEach((stock, index) => {

        let colorClass = stock.change.includes("-") ? "negative" : "positive";

        container.innerHTML += `
            <div class="stock-card">
                <h3>${stock.symbol}</h3>
                <p>💰 Price: ${stock.price}</p>
                <p class="${colorClass}">📈 Change: ${stock.change}</p>
                <button onclick="removeStock(${index})">Remove</button>
            </div>
        `;
    });
}

function removeStock(index) {
    watchlist.splice(index, 1);
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
    loadWatchlist();
}

loadWatchlist();
</script>

</body>
</html>
